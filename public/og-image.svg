<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0F172A"/>
  <defs>
    <radialGradient id="grad1" cx="50%" cy="0%" r="70%" fx="50%" fy="0%">
      <stop offset="0%" style="stop-color:#FF6B00;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF914D;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="15" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#grad1)"/>

  <!-- Logo/Brand Symbol (Simplified) -->
  <circle cx="600" cy="170" r="56" fill="#3B82F6" opacity="0.14" />
  <path d="M560 175 C585 135 635 135 660 175 C635 215 585 215 560 175 Z" fill="#3B82F6" opacity="0.95" />
  <circle cx="610" cy="175" r="14" fill="#0F172A" />
  
  <!-- Main Title -->
  <text x="600" y="300" font-family="Arial, sans-serif" font-weight="800" font-size="64" text-anchor="middle" fill="#FFFFFF" filter="url(#shadow)">
    GamsGo Code
  </text>

  <!-- Topic Badge -->
  <rect x="375" y="340" width="450" height="72" rx="16" fill="#1D4ED8" filter="url(#shadow)"/>
  <text x="600" y="388" font-family="Arial, sans-serif" font-weight="800" font-size="34" text-anchor="middle" fill="#FFFFFF">
    프론트엔드 실무 코드 자료실
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="500" font-family="Arial, sans-serif" font-weight="600" font-size="32" text-anchor="middle" fill="#94A3B8">
    React · TypeScript · CSS Layout · 웹 성능
  </text>
  
  <!-- Trust Badges -->
  <g transform="translate(480, 560)">
    <circle cx="0" cy="0" r="15" fill="#3B82F6" opacity="0.25" />
    <text x="25" y="10" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF" font-weight="600">실무 코드 예시</text>
  </g>
  <g transform="translate(720, 560)">
    <circle cx="0" cy="0" r="15" fill="#3B82F6" opacity="0.25" />
    <text x="25" y="10" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF" font-weight="600">문제 해결 체크리스트</text>
  </g>
</svg>
